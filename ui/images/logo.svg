<?xml version="1.0" encoding="UTF-8"?>
<svg width="180px" height="40px" viewBox="0 0 180 40" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>CyberX Logo</title>
    <desc>CyberX - Cybersecurity Platform</desc>
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
        </linearGradient>
    </defs>
    <g id="cyberx-logo" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <!-- Shield with X symbol -->
        <g id="icon">
            <path d="M 10 5 L 10 20 C 10 28 18 34 20 35 C 22 34 30 28 30 20 L 30 5 Z" fill="url(#grad1)" stroke="#00D4FF" stroke-width="1"/>
            <line x1="12" y1="8" x2="28" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
            <line x1="28" y1="8" x2="12" y2="32" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        </g>
        <!-- Text: CyberX -->
        <g id="text" fill="#1A1A1A" font-family="Arial, sans-serif" font-weight="bold" font-size="24">
            <text x="38" y="28">CyberX</text>
        </g>
    </g>
</svg>